name: Publish

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Verify tag points at main HEAD
        run: |
          git fetch origin main --depth=1
          MAIN_SHA="$(git rev-parse origin/main)"

          if [ "$GITHUB_SHA" != "$MAIN_SHA" ]; then
            echo "::error::Release tags must point at the current origin/main HEAD."
            echo "::error::tag=$GITHUB_SHA origin/main=$MAIN_SHA"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify lockstep versions and tag match
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PARSER_V=$(node -e "console.log(require('./packages/parser/package.json').version)")
          RENDERER_V=$(node -e "console.log(require('./packages/renderer/package.json').version)")
          CLI_V=$(node -e "console.log(require('./packages/cli/package.json').version)")
          GLYPHO_V=$(node -e "console.log(require('./packages/glypho/package.json').version)")

          # All four packages must be at the same version
          if [ "$PARSER_V" != "$RENDERER_V" ] || [ "$PARSER_V" != "$CLI_V" ] || [ "$PARSER_V" != "$GLYPHO_V" ]; then
            echo "::error::Package versions are not in lockstep: parser=$PARSER_V renderer=$RENDERER_V cli=$CLI_V glypho=$GLYPHO_V"
            exit 1
          fi

          # Tag must match the lockstep version
          if [ "$TAG" != "$PARSER_V" ]; then
            echo "::error::Tag v$TAG does not match package version $PARSER_V"
            exit 1
          fi

          # Internal dependency versions must match lockstep version
          RENDERER_PARSER_DEP=$(node -e "console.log(require('./packages/renderer/package.json').dependencies['@glypho/parser'])")
          CLI_PARSER_DEP=$(node -e "console.log(require('./packages/cli/package.json').dependencies['@glypho/parser'])")
          CLI_RENDERER_DEP=$(node -e "console.log(require('./packages/cli/package.json').dependencies['@glypho/renderer'])")
          GLYPHO_PARSER_DEP=$(node -e "console.log(require('./packages/glypho/package.json').dependencies['@glypho/parser'])")
          GLYPHO_RENDERER_DEP=$(node -e "console.log(require('./packages/glypho/package.json').dependencies['@glypho/renderer'])")

          FAIL=0
          for DEP_PAIR in \
            "renderer->parser:$RENDERER_PARSER_DEP" \
            "cli->parser:$CLI_PARSER_DEP" \
            "cli->renderer:$CLI_RENDERER_DEP" \
            "glypho->parser:$GLYPHO_PARSER_DEP" \
            "glypho->renderer:$GLYPHO_RENDERER_DEP"; do
            LABEL="${DEP_PAIR%%:*}"
            DEP_V="${DEP_PAIR##*:}"
            if [ "$DEP_V" != "$PARSER_V" ]; then
              echo "::error::$LABEL dependency is $DEP_V, expected $PARSER_V"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then exit 1; fi

          echo "All packages at v$PARSER_V, tag matches, dependencies valid"

      - name: Determine npm dist-tag
        id: dist-tag
        run: |
          VERSION=$(node -e "console.log(require('./packages/parser/package.json').version)")
          if [[ "$VERSION" == *-* ]]; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify npm token is configured
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::NODE_AUTH_TOKEN is not set. Configure NPM_TOKEN in the npm-publish environment."
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @glypho/parser
        run: |
          npm publish --workspace=packages/parser --access public --tag ${{ steps.dist-tag.outputs.tag }} --provenance || {
            if npm view @glypho/parser@$(node -e "console.log(require('./packages/parser/package.json').version)") > /dev/null 2>&1; then
              echo "Already published, skipping"
            else
              exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @glypho/renderer
        run: |
          npm publish --workspace=packages/renderer --access public --tag ${{ steps.dist-tag.outputs.tag }} --provenance || {
            if npm view @glypho/renderer@$(node -e "console.log(require('./packages/renderer/package.json').version)") > /dev/null 2>&1; then
              echo "Already published, skipping"
            else
              exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @glypho/cli
        run: |
          npm publish --workspace=packages/cli --access public --tag ${{ steps.dist-tag.outputs.tag }} --provenance || {
            if npm view @glypho/cli@$(node -e "console.log(require('./packages/cli/package.json').version)") > /dev/null 2>&1; then
              echo "Already published, skipping"
            else
              exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish glypho
        run: |
          npm publish --workspace=packages/glypho --access public --tag ${{ steps.dist-tag.outputs.tag }} --provenance || {
            if npm view glypho@$(node -e "console.log(require('./packages/glypho/package.json').version)") > /dev/null 2>&1; then
              echo "Already published, skipping"
            else
              exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
